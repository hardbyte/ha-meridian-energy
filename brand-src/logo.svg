<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="512" viewBox="0 0 2048 512" role="img" aria-label="Meridian Energy">
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="420" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="55%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="bolt" x1="200" y1="110" x2="280" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="sun" x1="150" y1="140" x2="260" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#042F2E" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Transparent canvas; mark + wordmark only -->
  <g transform="translate(48,48)" filter="url(#soft)">
    <rect width="416" height="416" rx="100" fill="url(#bg)"/>
    <rect x="14" y="14" width="388" height="388" rx="88" fill="none" stroke="#99F6E4" stroke-opacity="0.18" stroke-width="3"/>

    <g transform="translate(-8,-4) scale(0.92)">
      <circle cx="210" cy="198" r="54" fill="url(#sun)"/>
      <g stroke="#FCD34D" stroke-width="9" stroke-linecap="round" opacity="0.9">
        <path d="M210 118 V132"/>
        <path d="M210 264 V278"/>
        <path d="M130 198 H144"/>
        <path d="M276 198 H290"/>
        <path d="M152 140 L162 150"/>
        <path d="M258 246 L268 256"/>
        <path d="M152 256 L162 246"/>
        <path d="M258 150 L268 140"/>
      </g>
      <path fill="url(#bolt)" d="M292 118 L196 262 H250 L214 394 L336 228 H278 Z"/>
      <g stroke="#CCFBF1" stroke-opacity="0.35" stroke-width="7" stroke-linecap="round">
        <path d="M150 392 H362"/>
        <path d="M178 392 V416"/>
        <path d="M256 392 V424"/>
        <path d="M334 392 V416"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" fill="#0F766E">
    <text x="560" y="250" font-size="128" font-weight="700" letter-spacing="-1.5">Meridian Energy</text>
    <text x="564" y="330" font-size="42" font-weight="500" fill="#0D9488" letter-spacing="3.5">HOME ASSISTANT</text>
  </g>
</svg>
