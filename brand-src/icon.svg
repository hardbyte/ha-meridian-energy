<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Meridian Energy">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="55%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="bolt" x1="220" y1="110" x2="300" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="sun" x1="160" y1="140" x2="280" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#042F2E" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#bg)" filter="url(#soft)"/>

  <!-- Subtle inner highlight -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="#99F6E4" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Solar disc (upper-left of glyph) -->
  <circle cx="210" cy="198" r="58" fill="url(#sun)" opacity="0.95"/>
  <!-- rays -->
  <g stroke="#FCD34D" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <path d="M210 112 V128"/>
    <path d="M210 268 V284"/>
    <path d="M124 198 H140"/>
    <path d="M280 198 H296"/>
    <path d="M148 136 L160 148"/>
    <path d="M260 248 L272 260"/>
    <path d="M148 260 L160 248"/>
    <path d="M260 148 L272 136"/>
  </g>

  <!-- Energy bolt (foreground) -->
  <path
    fill="url(#bolt)"
    d="M292 118
       L196 262
       H250
       L214 394
       L336 228
       H278
       Z"
  />

  <!-- Small grid base hint -->
  <g stroke="#CCFBF1" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round">
    <path d="M150 392 H362"/>
    <path d="M178 392 V418"/>
    <path d="M256 392 V426"/>
    <path d="M334 392 V418"/>
  </g>
</svg>
